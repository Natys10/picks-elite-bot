[build]
builder = "NIXPACKS"

[deploy]
startCommand = "python picks_elite_bot.py"
# ON_FAILURE: Solo reinicia si el bot cae por error, no en cada deploy
restartPolicyType   = "ON_FAILURE"
restartPolicyMaxRetries = 5
# numReplicas = 1 garantiza que nunca haya dos instancias al mismo tiempo
# Esto elimina el error: "Conflict: terminated by other getUpdates request"
numReplicas = 1
